services:
  blog:
    image: ghcr.io/xszs12138/blog:${IMAGE_TAG:-latest}
    container_name: xszs-blog
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_PUBLIC_API_BASE: /api
      # SSR 访问宿主机 Go API（Linux Docker 20.10+）
      NUXT_API_BASE: http://host.docker.internal:8080/api
    extra_hosts:
      - "host.docker.internal:host-gateway"
